name: ikuuu 每日签到

on:
  schedule:
    # 北京时间每天 06:00 (UTC 22:00 前一天)
    - cron: '0 22 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行签到
        id: checkin
        env:
          IKUUU_COOKIE: ${{ secrets.IKUUU_COOKIE }}
        run: python checkin.py

      - name: 签到失败通知
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ ikuuu 签到失败 - ' + new Date().toISOString().slice(0, 10),
              body: '签到脚本执行失败，可能原因：\n\n1. Cookie 已过期，请更新 `IKUUU_COOKIE` Secret\n2. ikuuu 网站不可达\n\n请检查 [Actions 日志](' +
                `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` + ') 获取详情。',
              labels: ['checkin-failed']
            });
